backend:
  name: github
  repo: refu15/vaizo-website
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "お知らせ"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "公開日", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - label: "カテゴリ"
        name: "category"
        widget: "select"
        options:
          - { label: "プレスリリース", value: "PRESS" }
          - { label: "サービス", value: "SERVICE" }
          - { label: "お知らせ", value: "INFO" }
          - { label: "コラム", value: "COLUMN" }
      - { label: "アイキャッチ画像", name: "thumbnail", widget: "image", required: false }
      - { label: "概要", name: "description", widget: "text", required: false }
      - { label: "本文", name: "body", widget: "markdown" }
      - { label: "公開", name: "published", widget: "boolean", default: true }
